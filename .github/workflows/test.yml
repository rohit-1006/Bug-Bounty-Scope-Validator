# .github/workflows/test.yml

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run self-test suite
        run: python scope_checker.py --self-test

      - name: Run self-test without optional deps
        run: |
          pip uninstall -y requests pyyaml
          python scope_checker.py --self-test

      - name: Verify CLI help
        run: python scope_checker.py --version

      - name: Verify init command
        run: |
          python scope_checker.py --init test-scope.yaml
          cat test-scope.yaml

      - name: End-to-end test
        run: |
          pip install pyyaml
          python scope_checker.py --init e2e-scope.yaml
          python scope_checker.py --import-yaml e2e-scope.yaml
          python scope_checker.py --list-programs
          python scope_checker.py -p my-program -c dev.example.com
          python scope_checker.py -p my-program --show-scope
          python scope_checker.py --stats
          echo -e "dev.example.com\\nadmin.example.com\\nrandom.org" | python scope_checker.py --filter -p my-program
